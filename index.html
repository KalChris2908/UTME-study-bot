<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Study Bot — SHS Revision</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app">
    <header class="header">
      <h1>Study Bot</h1>
      <div class="controls">
        <button id="themeToggle" class="icon-btn">🌙</button>
      </div>
    </header>

    <main class="main">
      <section class="panel left">
        <h2>My Study Plan</h2>

        <form id="topicForm" class="form">
          <select id="subjectSelect" required>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Math">Math</option>
          </select>

          <input id="titleInput" placeholder="Topic title (e.g. Newton's Laws)" required />
          <textarea id="notesInput" placeholder="Short summary / notes (optional)"></textarea>

          <div class="row">
            <select id="statusSelect">
              <option value="not-started">Not started</option>
              <option value="studying">Studying</option>
              <option value="done">Done</option>
            </select>
            <button id="addTopicBtn" type="submit" class="btn">Add / Update</button>
          </div>
        </form>

        <div class="filters-row">
          <input id="searchInput" placeholder="Search topics..." />
          <select id="filterSubject">
            <option value="all">All subjects</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Math">Math</option>
          </select>
        </div>

        <ul id="topicList" class="topic-list"></ul>
      </section>

      <section class="panel right">
        <div class="dashboard">
          <h2>Revision & Quiz</h2>

          <div class="controls-row">
            <select id="revSubject">
              <option value="all">Any subject</option>
              <option value="Physics">Physics</option>
              <option value="Chemistry">Chemistry</option>
              <option value="Math">Math</option>
            </select>

            <button id="revButton" class="btn">Revise Random</button>
            <button id="quizButton" class="btn accent">Quick Quiz</button>
          </div>

          <div id="progressWrap" class="progress-wrap">
            <div class="progress-info"><span id="doneCount">0</span>/<span id="totalCount">0</span> done</div>
            <div class="progress"><div id="progressBar"></div></div>
          </div>

          <div id="card" class="card hidden">
            <h3 id="cardTitle">Title</h3>
            <div id="cardMeta" class="meta">Subject • Status</div>
            <p id="cardNotes">Notes appear here.</p>

            <div id="quizArea" class="quiz hidden">
              <div id="qText" class="qtext"></div>
              <div id="choices" class="choices"></div>
              <div id="shortAnswer" class="short-answer hidden">
                <input id="shortInput" placeholder="Type answer..." />
                <button id="shortCheck" class="btn">Check</button>
              </div>
              <div id="quizResult" class="quiz-result"></div>
            </div>

            <div class="card-actions">
              <button id="markStudying" class="btn">Mark Studying</button>
              <button id="markDone" class="btn">Mark Done</button>
            </div>
          </div>

          <div id="emptyMsg" class="empty">No topic selected — use "Revise Random" or pick one from the list.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Core scripts: topics (default content) -> storage -> ui -> app -->
  <script src="js/topics.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
